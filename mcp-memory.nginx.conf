# MCP Shared Memory Server
# Proxy for SSE transport with proper headers for remote access

upstream mcp_memory {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 8081;
    listen [::]:8081;

    server_name _;

    # Health check endpoint
    location /health {
        proxy_pass http://mcp_memory/health;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSE endpoint - requires special handling
    location /sse {
        proxy_pass http://mcp_memory/sse;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE specific settings
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Long timeout for SSE
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # MCP messages endpoint
    location /messages/ {
        proxy_pass http://mcp_memory/messages/;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';

        # Allow POST with body
        proxy_request_buffering off;
        proxy_buffering off;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
