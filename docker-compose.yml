services:
  chromadb:
    # Pinned to a LOCAL tag of the image that created our existing data. The
    # real image ID is sha256:501769453712... (Chroma 1.x, pulled 2025-12-12).
    # Downgrading to 0.6.x breaks the SQLite schema — seen 2026-04-17 during
    # migration: 0 collections visible because 0.6.x can't read 1.x data.
    # To upgrade: test a full container rebuild on a volume COPY first.
    image: chromadb/chroma:local-known-working
    pull_policy: never
    container_name: mcp-chromadb
    # Chroma 1.x persists to /data by default. The previous mount at
    # /chroma/chroma was silently ignored, causing the Apr 2026 data loss
    # incident when the pre-existing container was recreated. Keep this
    # at /data and never change it without testing a container rebuild.
    volumes:
      - chroma-data:/data
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    healthcheck:
      # This image doesn't ship curl/wget. Use bash's /dev/tcp to check if
      # the HTTP port accepts connections (opens socket, immediately closes).
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mongodb:
    # Pinned version for the same reason as chromadb above.
    image: mongo:7.0
    container_name: mcp-mongodb
    volumes:
      - mongo-data:/data/db
    ports:
      - "${MONGO_PORT:-27019}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mcp_orch}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-mcp_orchestrator}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mcp-server:
    build: .
    container_name: mcp-rag-arch
    depends_on:
      chromadb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file: .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
    ports:
      - "8080:8080"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  # These volumes are declared external so compose never creates or destroys
  # them — populated in 2026-04-14 during data-loss recovery. A fresh deploy
  # elsewhere should remove the `external` + `name` fields so compose creates
  # them automatically on first `up -d`.
  chroma-data:
    external: true
    name: chroma-persistent
  mongo-data:
    external: true
    name: mcp-mongo-persistent
